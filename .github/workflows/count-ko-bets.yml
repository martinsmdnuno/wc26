name: Count KO bets (one-off)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  count:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Count knockout bets
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT not set — skipping."
            exit 0
          fi
          npm i --no-save firebase-admin@12
          node scripts/count-ko-bets.mjs
