name: Send notifications

on:
  schedule:
    # Every 15 minutes. The script no-ops when there's nothing pending.
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      test_message:
        description: 'Send a test notification with this text to all subscribers'
        required: false
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Send pending notifications
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TEST_MESSAGE: ${{ inputs.test_message }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT not set — skipping."
            exit 0
          fi
          npm i --no-save firebase-admin@12
          node scripts/send-notifications.mjs
